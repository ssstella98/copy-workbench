<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Producer Copy Workbench</title>
<style>
  :root {
    --bg: #f3f4f6; --surface: #fff; --border: #e0e2e6;
    --text: #1a1c1e; --text2: #6b7280; --text3: #9ca3af;
    --blue: #2563eb; --blue-bg: #eff6ff; --blue-border: #bfdbfe;
    --green: #16a34a; --green-bg: #f0fdf4;
    --amber: #d97706; --amber-bg: #fffbeb;
    --red: #dc2626; --red-bg: #fef2f2;
    --purple: #7c3aed; --purple-bg: #f5f3ff;
    --radius: 8px; --radius-sm: 5px;
    --shadow: 0 1px 3px rgba(0,0,0,.05);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: #e8eaed; min-height: 100vh; padding: 20px;
    display: flex; justify-content: center; align-items: flex-start;
    -webkit-font-smoothing: antialiased;
  }
  .app { width: 100%; max-width: 1520px; display: flex; flex-direction: column; gap: 14px; }

  /* Header */
  .header {
    background: #1e1e24; color: #fff; border-radius: var(--radius);
    padding: 14px 22px; display: flex; align-items: center; gap: 14px;
  }
  .header h1 { font-size: 16px; font-weight: 700; }
  .header .back { color: rgba(255,255,255,.6); cursor: pointer; font-size: 12px; }
  .header .back:hover { color: #fff; }

  /* Buttons */
  .btn {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 7px 14px; border-radius: var(--radius-sm);
    font-size: 12px; font-weight: 500; cursor: pointer;
    border: 1px solid var(--border); background: #fff;
    color: var(--text); font-family: inherit; transition: .15s; white-space: nowrap;
  }
  .btn:hover { background: #f9fafb; }
  .btn.primary { background: var(--blue); color: #fff; border-color: var(--blue); }
  .btn.primary:hover { opacity: .9; }
  .btn.danger { color: var(--red); border-color: #fecaca; }
  .btn.sm { padding: 4px 10px; font-size: 11px; }

  /* Toolbar */
  .toolbar {
    background: var(--surface); border-radius: var(--radius); padding: 10px 16px;
    display: flex; align-items: center; gap: 10px; box-shadow: var(--shadow); flex-wrap: wrap;
  }
  .toolbar input {
    padding: 6px 10px; font-size: 12px; border: 1px solid var(--border);
    border-radius: var(--radius-sm); font-family: inherit;
  }
  .toolbar input:focus { outline: none; border-color: var(--blue); }
  .toolbar label { font-size: 11px; font-weight: 600; color: var(--text2); white-space: nowrap; }
  .status { font-size: 11px; color: var(--text2); display: flex; align-items: center; gap: 5px; }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; }
  .status-dot.ok { background: var(--green); }
  .status-dot.err { background: var(--red); }
  .status-dot.loading { background: var(--amber); animation: pulse .8s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  /* Tags */
  .tag { display: inline-block; font-size: 9px; font-weight: 500; padding: 2px 7px; border-radius: 8px; }
  .tag.blue { background: var(--blue-bg); color: var(--blue); }
  .tag.green { background: var(--green-bg); color: var(--green); }
  .tag.amber { background: var(--amber-bg); color: var(--amber); }
  .tag.red { background: var(--red-bg); color: var(--red); }

  /* ====== PROJECT LIST ====== */
  .project-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
  .project-card {
    background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow);
    padding: 20px; cursor: pointer; border: 1.5px solid transparent; transition: .15s;
  }
  .project-card:hover { border-color: var(--blue-border); box-shadow: 0 2px 8px rgba(0,0,0,.08); }
  .project-card h4 { font-size: 14px; margin-bottom: 4px; }
  .project-card .meta { font-size: 11px; color: var(--text2); margin-bottom: 8px; }
  .project-card .actions-row { display: flex; gap: 6px; margin-top: 8px; }
  .project-card .actions-row button { font-size: 10px; padding: 3px 8px; }

  /* ====== WORKSPACE LAYOUT ====== */
  .ws-layout { display: flex; gap: 12px; flex: 1; align-items: flex-start; }
  .sidebar-canvas {
    width: 220px; flex-shrink: 0; background: var(--surface); border-radius: var(--radius);
    box-shadow: var(--shadow); display: flex; flex-direction: column; max-height: calc(100vh - 180px);
    position: sticky; top: 20px; transition: width .15s;
  }
  .sidebar-canvas.collapsed { width: 36px; }
  .sidebar-canvas .sb-header {
    padding: 10px 12px; font-size: 11px; font-weight: 700; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .sidebar-canvas .sb-header .toggle-btn { cursor: pointer; font-size: 14px; color: var(--text3); }
  .sidebar-canvas .sb-body { flex: 1; overflow-y: auto; padding: 8px 0; }
  .sidebar-canvas .sb-footer { padding: 10px; border-top: 1px solid var(--border); }
  .sidebar-canvas.collapsed .sb-body,
  .sidebar-canvas.collapsed .sb-footer { display: none; }

  .canvas-group { margin-bottom: 2px; }
  .canvas-group .cg-header {
    padding: 6px 10px; font-size: 10px; font-weight: 700; color: var(--text3);
    text-transform: uppercase; letter-spacing: .5px; cursor: pointer; display: flex; align-items: center; gap: 4px;
  }
  .canvas-group .frame-item {
    padding: 5px 10px 5px 24px; font-size: 11px; cursor: pointer; display: flex; align-items: center; gap: 4px;
    color: var(--text2); transition: .1s;
  }
  .canvas-group .frame-item:hover { background: #f3f4f6; }
  .canvas-group .frame-item.active { background: var(--blue-bg); color: var(--blue); font-weight: 600; }

  /* Panel: preview + key table */
  .panel-preview {
    width: 380px; flex-shrink: 0; display: flex; flex-direction: column; gap: 10px;
    position: sticky; top: 20px; max-height: calc(100vh - 140px);
  }
  .preview-card {
    background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow);
    display: flex; flex-direction: column; overflow: hidden; flex: 1;
  }
  .preview-card .preview-header {
    padding: 8px 12px; font-size: 12px; font-weight: 600; border-bottom: 1px solid var(--border);
  }
  .preview-card .preview-body {
    overflow-y: auto; background: #fafbfc; position: relative;
    display: flex; align-items: flex-start; justify-content: center;
    flex: 1; max-height: calc(100vh - 240px);
  }
  .preview-body img { width: 100%; display: block; border-radius: 2px; flex-shrink: 0; }

  .highlight-overlay {
    position: absolute; border: 1.5px dashed var(--blue);
    background: rgba(37,99,235,.04); border-radius: 2px;
    pointer-events: none; transition: all .12s; z-index: 2;
  }
  .highlight-overlay .hl-num {
    position: absolute; top: -10px; left: -2px;
    background: var(--blue); color: #fff; font-size: 9px; font-weight: 700;
    width: 16px; height: 16px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transform: scale(.5); transition: all .12s;
  }
  .highlight-overlay.active { border-color: var(--red); border-width: 2px; background: rgba(220,38,38,.08); }
  .highlight-overlay.active .hl-num { opacity: 1; transform: scale(1); background: var(--red); }

  .page-nav {
    display: flex; align-items: center; gap: 8px;
    background: var(--surface); border-radius: var(--radius); padding: 8px 12px; box-shadow: var(--shadow);
  }
  .page-nav .page-name { font-size: 12px; font-weight: 600; flex: 1; text-align: center; }
  .page-nav .page-count { font-size: 10px; color: var(--text2); }

  .panel-keys { flex: 1; display: flex; flex-direction: column; gap: 10px; min-width: 0; }
  .keys-card {
    background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow);
    display: flex; flex-direction: column; overflow: hidden; flex: 1;
  }
  .keys-card .keys-header {
    padding: 8px 12px; font-size: 12px; font-weight: 600; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .keys-table-wrap { overflow-y: auto; flex: 1; }

  table { width: 100%; border-collapse: collapse; font-size: 11px; }
  th {
    text-align: left; padding: 7px 8px; font-weight: 600; font-size: 10px;
    color: var(--text2); border-bottom: 1px solid var(--border); background: #fafbfc;
    position: sticky; top: 0; z-index: 2;
  }
  td { padding: 6px 8px; border-bottom: 1px solid #f3f4f6; vertical-align: middle; }
  tr:hover td { background: #fafbfc; }
  tr.row-hover td { background: #fff7ed !important; }
  tr.row-hidden td { background: #f9fafb; color: var(--text3); opacity: .5; }
  tr.row-hidden td .td-figma { text-decoration: line-through; }

  .td-key { font-family: 'SF Mono', 'Cascadia Code', 'Menlo', monospace; font-size: 10px; color: var(--purple); max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .td-figma { font-size: 12px; max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  td input[type="text"], td select {
    font-family: inherit; font-size: 11px; padding: 4px 6px;
    border: 1px solid var(--border); border-radius: 3px; background: #fff; width: 100%;
  }
  td input:focus, td select:focus { outline: none; border-color: var(--blue); }

  .filter-bar { display: flex; gap: 6px; align-items: center; }
  .filter-bar label { font-size: 10px; color: var(--text2); display: flex; align-items: center; gap: 3px; cursor: pointer; }

  .hide-btn { cursor: pointer; font-size: 14px; color: var(--text3); padding: 2px 4px; border: none; background: none; }
  .hide-btn:hover { color: var(--red); }

  /* Row selection & actions */
  tr.row-selected td { background: #eff6ff !important; }
  tr.row-selected.row-hidden td { background: #e8f0fe !important; opacity: .65; }
  .sel-cb { width: 14px; height: 14px; cursor: pointer; accent-color: var(--blue); }
  .op-btn { cursor: pointer; font-size: 10px; padding: 2px 6px; border: 1px solid var(--border); border-radius: 3px; background: #fff; color: var(--text2); white-space: nowrap; }
  .op-btn:hover { background: var(--blue-bg); color: var(--blue); border-color: var(--blue); }
  .op-btn.restore { color: var(--green); border-color: #bbf7d0; }
  .op-btn.restore:hover { background: #f0fdf4; }

  /* Highlight overlay multi-number badge */
  .highlight-overlay .hl-num.multi { width: auto; padding: 0 5px; border-radius: 8px; }

  /* Tab buttons */
  .tab-btn {
    padding: 6px 16px; border: none; background: transparent;
    color: rgba(255,255,255,.6); font-size: 12px; font-weight: 500;
    cursor: pointer; border-radius: 5px; font-family: inherit; transition: .15s;
  }
  .tab-btn.active { background: rgba(255,255,255,.2); color: #fff; font-weight: 600; }
  .tab-btn:hover:not(.active):not(:disabled) { color: rgba(255,255,255,.85); }
  .tab-btn:disabled { cursor: not-allowed; }

  .btn.purple { background: var(--purple); color: #fff; border-color: var(--purple); }
  .btn.purple:hover { opacity: .9; }
  .row-ai td { background: #f0fdf4; }
  input.ai-filled { background: #f0fdf4; border-color: #bbf7d0; }
  .compliance-result { font-size: 11px; padding: 8px 10px; border-radius: 6px; }
  .compliance-result.pass { background: var(--green-bg); color: var(--green); }
  .compliance-result.warn { background: var(--amber-bg); color: var(--amber); }
  .compliance-result.fail { background: var(--red-bg); color: var(--red); }
  .sidebar-col .card { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); display: flex; flex-direction: column; overflow: hidden; }
  .sidebar-col .sb-header { padding: 8px 12px; font-size: 10px; font-weight: 700; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .sidebar-col .sb-body { flex: 1; overflow-y: auto; font-size: 10px; padding: 6px 0; }
  .l2-body.collapsed { display: none; }
  .l3-chip { background: var(--blue-bg); color: var(--blue); font-size: 9px; padding: 2px 7px; border-radius: 8px; cursor: pointer; white-space: nowrap; }
  .l3-chip:hover { background: #dbeafe; }
  .layer2-card textarea { width: 100%; padding: 6px 8px; font-size: 10px; font-family: inherit; border: 1px solid var(--border); border-radius: var(--radius-sm); resize: vertical; min-height: 40px; }
  .layer2-card textarea:focus, .layer1-row textarea:focus { outline: none; border-color: var(--blue); }

  /* Picker panel */
  .picker-panel {
    background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow);
    padding: 14px 18px; margin-bottom: 4px;
  }
  .fp-item {
    padding: 8px 12px; border-bottom: 1px solid var(--border); cursor: pointer;
    display: flex; align-items: center; gap: 10px; transition: background .1s;
  }
  .fp-item:hover { background: var(--blue-bg); }
  .fp-item .fp-name { font-size: 12px; }
  .fp-item .fp-count { font-size: 10px; color: var(--text3); background: #f3f4f6; padding: 2px 7px; border-radius: 8px; }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.35);
    display: none; align-items: center; justify-content: center; z-index: 100;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: #fff; border-radius: 12px; padding: 22px; width: 440px; max-width: 90%;
    box-shadow: 0 12px 40px rgba(0,0,0,.18);
  }
  .modal h3 { font-size: 15px; margin-bottom: 14px; }
  .modal .form-group { margin-bottom: 12px; }
  .modal .form-group label { display: block; font-size: 11px; font-weight: 600; color: var(--text2); margin-bottom: 3px; }
  .modal .form-group input, .modal .form-group select {
    width: 100%; padding: 7px 10px; font-size: 13px; border: 1px solid var(--border);
    border-radius: var(--radius-sm); font-family: inherit;
  }
  .modal .form-group input:focus { outline: none; border-color: var(--blue); }
  .modal .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }

  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: #1e1e24; color: #fff; padding: 10px 20px;
    border-radius: var(--radius-sm); font-size: 12px; font-weight: 500;
    box-shadow: 0 4px 12px rgba(0,0,0,.2); z-index: 200;
    opacity: 0; transform: translateY(10px); transition: .2s; pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateY(0); }

  .empty-state { text-align: center; padding: 48px 24px; color: var(--text3); }
  .empty-state .icon { font-size: 40px; margin-bottom: 10px; }
  .empty-state p { font-size: 13px; margin-bottom: 14px; }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
</style>
</head>
<body>
<div class="app" id="appRoot"></div>
<!-- AI Copy Popup -->
<div class="modal-overlay" id="aiCopyPopup">
  <div class="modal" style="width:520px;max-width:94%;">
    <h4>🤖 AI 写文案</h4>
    <div style="font-size:10px;color:var(--text3);display:flex;gap:12px;margin-bottom:10px;">
      <span><strong>Key:</strong> <span id="aiPopupKey">—</span></span>
      <span><strong>Module:</strong> <span id="aiPopupModule">—</span></span>
      <span><strong>Figma 草稿:</strong> <span id="aiPopupFigma">—</span></span>
    </div>
    <div class="form-group">
      <label>💬 Layer 3 · 字段提示</label>
      <textarea id="aiPopupHint" rows="3" placeholder="描述触发条件、交互行为、状态变化、跳转目标..."></textarea>
    </div>
    <input type="hidden" id="aiPopupFieldIdx">
    <div style="margin-bottom:8px;"><button class="btn purple sm" onclick="generateAICopy()">🪄 生成文案</button></div>
    <div id="aiPopupResult" style="display:none;display:flex;gap:8px;margin-bottom:8px;">
      <div style="flex:1;"><label>🇨🇳 中文</label><input type="text" id="aiPopupResultZH" style="width:100%;padding:6px 8px;border:1px solid #bbf7d0;background:#f0fdf4;border-radius:4px;font-size:12px;"></div>
      <div style="flex:1;"><label>🇺🇸 English</label><input type="text" id="aiPopupResultEN" style="width:100%;padding:6px 8px;border:1px solid #bbf7d0;background:#f0fdf4;border-radius:4px;font-size:12px;"></div>
    </div>
    <div id="aiPopupComp" style="font-size:11px;padding:8px 10px;border-radius:6px;margin-bottom:8px;"></div>
    <div class="modal-actions">
      <button class="btn sm" onclick="closeAICopyPopup()">取消</button>
      <button class="btn primary sm" onclick="confirmAICopy()">✅ 确认并填入表格</button>
    </div>
  </div>
</div>

<!-- Visual Doc Picker -->
<div class="modal-overlay" id="visualDocPicker">
  <div class="modal" style="width:480px;max-height:70vh;display:flex;flex-direction:column;">
    <h4>📄 选择导出页面</h4>
    <p style="font-size:11px;color:var(--text2);margin-bottom:8px;">勾选需要导出到视觉文档的页面，默认全选有截图的页面</p>
    <div style="display:flex;gap:6px;margin-bottom:8px;">
      <button class="btn sm" onclick="document.querySelectorAll('.vd-check:not([disabled])').forEach(c=>c.checked=true)">全选</button>
      <button class="btn sm" onclick="document.querySelectorAll('.vd-check').forEach(c=>c.checked=false)">取消全选</button>
      <span style="flex:1;"></span>
      <button class="btn primary sm" onclick="exportVisualDocSelected()">📄 导出选中页面</button>
    </div>
    <div id="vdPickerList" style="overflow-y:auto;max-height:400px;"></div>
  </div>
</div>

<!-- Compliance Result Popup -->
<div class="modal-overlay" id="complianceResultPopup">
  <div class="modal" style="width:480px;max-width:94%;">
    <h4>🔍 AI 合规审查</h4>
    <div id="compResultContent"></div>
  </div>
</div>

<!-- New Key Modal -->
<div class="modal-overlay" id="newKeyModal">
  <div class="modal" style="width:800px;max-width:95%;max-height:85vh;display:flex;flex-direction:column;">
    <h4 style="margin-bottom:12px;">➕ 新建 Key</h4>
    <div style="display:flex;gap:16px;flex:1;min-height:0;">
      <!-- Left: Screenshot with selection -->
      <div style="flex:1;display:flex;flex-direction:column;gap:6px;min-width:0;">
        <label style="font-size:10px;font-weight:600;color:var(--text2);">📱 在截图上拖拽框选位置</label>
        <div id="nkCanvasWrap" style="position:relative;overflow:auto;background:#fafbfc;border:1px solid var(--border);border-radius:6px;flex:1;min-height:300px;cursor:crosshair;">
          <div style="position:relative;display:inline-block;line-height:0;min-width:100%;" id="nkImgContainer">
            <img id="nkPreviewImg" src="" style="width:100%;display:block;" alt="Frame preview" draggable="false">
            <div id="nkSelection" style="display:none;position:absolute;border:2px dashed var(--red);background:rgba(220,38,38,.08);border-radius:2px;pointer-events:none;z-index:2;"></div>
          </div>
        </div>
        <span style="font-size:10px;color:var(--text3);" id="nkPosInfo">未选择区域 — 在截图上拖拽以框选位置</span>
      </div>
      <!-- Right: Form -->
      <div style="width:240px;flex-shrink:0;display:flex;flex-direction:column;gap:8px;">
        <div class="form-group"><label>Domain</label><input type="text" id="nkDomain" readonly style="background:#f9fafb;"></div>
        <div class="form-group"><label>Page</label><input type="text" id="nkPage" placeholder="e.g. HomePage"></div>
        <div class="form-group"><label>Module</label>
          <select id="nkModule"><option value="">-- 待选 --</option></select>
          <input type="text" id="nkModuleCustom" placeholder="自定义 module" style="margin-top:3px;font-size:10px;">
        </div>
        <div class="form-group"><label>Title</label><input type="text" id="nkTitle" placeholder="e.g. ConfirmButton"></div>
        <div class="form-group"><label>Body (可选)</label><input type="text" id="nkBody" placeholder="可选后缀"></div>
        <div style="flex:1;"></div>
        <div class="modal-actions" style="margin-top:0;">
          <button class="btn sm" onclick="hideModal('newKeyModal')">取消</button>
          <button class="btn primary sm" onclick="saveNewKey()">✅ 创建 Key</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Create Project Modal -->
<div class="modal-overlay" id="projectModal">
  <div class="modal">
    <h3 id="projectModalTitle">新建项目</h3>
    <div class="form-group"><label>项目名称</label><input id="projName" placeholder="e.g. HMH Hotel Magic Hub"></div>
    <div class="form-group"><label>Domain（Key 中的项目前缀）</label><input id="projDomain" placeholder="e.g. HMH"></div>
    <div class="form-group">
      <label>Figma URL（可选，可后续添加）</label>
      <input id="projFigmaUrl" placeholder="https://www.figma.com/design/...">
    </div>
    <div class="form-group">
      <label>Figma Token（可选）</label>
      <input type="password" id="projToken" placeholder="figd_...">
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="hideModal('projectModal')">取消</button>
      <button class="btn primary" id="projSaveBtn" onclick="saveProject()">创建项目</button>
    </div>
  </div>
</div>

<script>
// ============================================================
// CONFIG
// ============================================================
const HUNYUAN_API = '/api/hunyuan/v1/chat/completions';

// ============================================================
// PERSISTENCE: localStorage (project list) + IndexedDB (data)
// ============================================================
const LS_KEY = 'cw_projects';
const DB_NAME = 'CopyWorkbench';
const DB_VERSION = 1;

function loadProjects() {
  try { return JSON.parse(localStorage.getItem(LS_KEY) || '[]'); }
  catch(e) { return []; }
}
function saveProjects(list) {
  localStorage.setItem(LS_KEY, JSON.stringify(list));
}

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains('figmaData')) db.createObjectStore('figmaData', { keyPath: 'projectId' });
      if (!db.objectStoreNames.contains('projectKeys')) db.createObjectStore('projectKeys', { keyPath: 'projectId' });
    };
    req.onsuccess = (e) => resolve(e.target.result);
    req.onerror = (e) => reject(e.target.error);
  });
}

async function dbPut(storeName, data) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, 'readwrite');
    tx.objectStore(storeName).put(data);
    tx.oncomplete = () => resolve();
    tx.onerror = (e) => reject(e.target.error);
  });
}

async function dbGet(storeName, id) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, 'readonly');
    const req = tx.objectStore(storeName).get(id);
    req.onsuccess = () => resolve(req.result || null);
    req.onerror = (e) => reject(e.target.error);
  });
}

async function dbDelete(storeName, id) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, 'readwrite');
    tx.objectStore(storeName).delete(id);
    tx.oncomplete = () => resolve();
    tx.onerror = (e) => reject(e.target.error);
  });
}

// ============================================================
// KEY GENERATION HELPERS
// ============================================================
const PROJECT_PREFIXES = ['HMH','PFC','Refund','hmh','pfc','refund'];

function mapFrameToPage(frameName) {
  const raw = (frameName || '').trim();
  if (!raw) return '';
  let cleaned = raw;
  for (const pfx of PROJECT_PREFIXES) {
    cleaned = cleaned.replace(new RegExp(`^${pfx}\\s+`, 'i'), '');
  }
  const hasChinese = /[一-鿿]/.test(cleaned);
  if (hasChinese) {
    const translated = suggestTitle(cleaned);
    return translated || toCamelCase(cleaned, 3);
  }
  return toCamelCase(cleaned, 3);
}

function toCamelCase(str, maxWords) {
  const words = str.split(/[\s\-_\/]+/).filter(w => w.length > 0);
  const capped = words.slice(0, maxWords).map((w) => {
    if (/^[A-Z][a-z]+$/.test(w) || /^[A-Z]+$/.test(w)) return w;
    return w.charAt(0).toUpperCase() + w.slice(1).toLowerCase();
  });
  return capped.join('');
}

function detectModule(text, relY) {
  const t = (text || '').trim();
  const kwMap = Object.keys(MODULE_KEYWORDS).length > 0 ? MODULE_KEYWORDS : {};
  for (const [mod, keywords] of Object.entries(kwMap)) {
    if (keywords.some(k => t.includes(k))) return mod;
  }
  const isBottom = relY > 0.85, isTop = relY < 0.12;
  if (isBottom && t.length <= 6) return 'NavigationBar';
  if (isBottom) return 'ActionBar';
  if (isTop && t.length > 20) return 'Banner';
  if (isTop && t.length <= 12) return 'TopTips';
  if (t.length > 40) return 'Notes';
  return '';
}

function suggestTitle(text) {
  const clean = (text || '').trim();
  if (!clean) return '';
  if (TITLE_MAP[clean]) return TITLE_MAP[clean];
  let bestMatch = null;
  for (const [cn, en] of Object.entries(TITLE_MAP)) {
    if (clean.includes(cn) && (!bestMatch || cn.length > bestMatch.cnLen)) {
      bestMatch = { en, cnLen: cn.length };
    }
  }
  if (bestMatch) return bestMatch.en;
  // Word-by-word decomposition
  const words = Object.keys(TITLE_MAP).filter(k => k.length >= 1).sort((a,b) => b.length - a.length);
  let remaining = clean, parts = [];
  while (remaining.length > 0) {
    let matched = null;
    for (const w of words) { if (remaining.startsWith(w)) { matched = w; break; } }
    if (matched) { parts.push(TITLE_MAP[matched]); remaining = remaining.slice(matched.length); }
    else { remaining = remaining.slice(1); }
  }
  return parts.slice(0, 3).join('');
}

function isDynamicData(text) {
  const t = text.trim();
  if (!t) return true;
  const stripped = t.replace(/[¥￥$\-+×xX,.，。、\s\/\\%℃*#^~|]/g, '');
  if (/^\d+$/.test(stripped) && stripped.length > 0) return true;
  if (/^\d{4}[年\/\-]\d{1,2}[月\/\-]\d{1,2}日?$/.test(t)) return true;
  if (/^\d{1,2}:\d{2}$/.test(t)) return true;
  if (/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(t)) return true;
  if (/^[¥￥$!！?？.。,+×xX%℃\s\-/\\*#^~|@&]$/.test(t)) return true;
  if (/^[a-zA-Z]$/.test(t)) return true;
  if (/^\+?\d{7,}$/.test(t)) return true;
  return false;
}

function isSkippableFrame(name) {
  const n = (name || '').toLowerCase();
  return ['iphone','android','device','mockup','封面','cover','legend','组件'].some(w => n.includes(w));
}

function buildKey(f, domain) {
  const parts = [domain, f.page, f.module, f.title];
  const filtered = parts.filter(p => p && p.trim());
  if (f.body && f.body.trim()) filtered.push(f.body.trim());
  return filtered.join('.');
}

function esc(str) {
  return (str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function batchAITranslate() {
  const apiKey = document.getElementById('aiApiKey')?.value?.trim();
  if (!apiKey) { showToast('请在工具栏填写混元 API Key'); return; }

  // Collect fields with empty title
  const toTranslate = [];
  for (const frame of WS.frames) {
    for (const field of frame.fields) {
      if ((!field.title || !field.title.trim()) && field.text && field.text.trim()) {
        toTranslate.push(field);
      }
    }
  }

  if (toTranslate.length === 0) { showToast('所有 Title 已填写'); return; }

  WS.status = `AI 翻译中 · ${toTranslate.length} 条...`;
  WS.statusType = 'loading';
  renderToolbar();

  let done = 0;
  const BATCH = 20;

  for (let i = 0; i < toTranslate.length; i += BATCH) {
    const batch = toTranslate.slice(i, i + BATCH);
    const inputs = batch.map(f => f.text);

    try {
      const resp = await fetch(HUNYUAN_API, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${apiKey}`
        },
        body: JSON.stringify({
          model: 'hunyuan-turbo',
          max_tokens: 300,
          temperature: 0.1,
          messages: [{
            role: 'user',
            content: `You are a UI copy translator. Translate each Chinese UI string below to an English CamelCase title (max 3 words). Return ONLY a JSON array of strings, same order. No explanation. If a string is not meaningful UI copy (pure numbers, single symbols), return "".

Examples:
"确认下单" → "Confirmation"
"请确认您的订单信息" → "OrderConfirm"
"行李寄存服务：酒店前台提供行李寄存" → "LuggageStorage"
"每间客房最多可入住2位成人及2位11周岁以下儿童" → "MaxGuestPerRoom"
"9:41" → ""
"¥458" → ""

Input: ${JSON.stringify(inputs)}`
          }]
        })
      });

      if (!resp.ok) {
        const err = await resp.text();
        throw new Error(`API ${resp.status}: ${err.slice(0, 200)}`);
      }

      const data = await resp.json();
      const content = data.choices?.[0]?.message?.content || '';
      // Extract JSON array from response
      const jsonMatch = content.match(/\[[\s\S]*\]/);
      if (!jsonMatch) throw new Error('No JSON array in response');

      const translations = JSON.parse(jsonMatch[0]);
      for (let j = 0; j < batch.length && j < translations.length; j++) {
        const t = (translations[j] || '').trim();
        if (t && t.length > 0) {
          const clean = t.replace(/[^a-zA-Z0-9]/g, '');
          const camel = clean.charAt(0).toUpperCase() + clean.slice(1);
          batch[j].title = camel.slice(0, 30);
        }
      }

      done += batch.length;
      WS.status = `AI 翻译中 · ${done}/${toTranslate.length}`;
      renderToolbar();
      renderKeyTable();

    } catch (err) {
      console.error('[AI] Batch failed:', err);
      WS.status = `翻译出错: ${err.message}`;
      WS.statusType = 'err';
      renderToolbar();
      renderKeyTable();
      showToast('AI 翻译出错: ' + err.message);
      return;
    }
  }

  WS.status = `AI 翻译完成 · ${toTranslate.length} 条`;
  WS.statusType = 'ok';
  renderToolbar();
  renderKeyTable();
  showToast(`已翻译 ${toTranslate.length} 条 Title`);
}

function parseFileKey(url) {
  const match = url.match(/figma\.com\/(?:file|design)\/([a-zA-Z0-9]+)/);
  return match ? match[1] : null;
}

async function fetchFigmaFile(fileKey, token) {
  for (let attempt = 0; attempt < 6; attempt++) {
    if (attempt > 0) {
      const waitMs = Math.pow(3, attempt) * 2000;
      WS.status = `Figma 限流 · ${Math.round(waitMs/1000)}s 后重试 (${attempt}/5)...`;
      renderToolbar();
      await new Promise(r => setTimeout(r, waitMs));
    }
    try {
      const resp = await fetch(`https://api.figma.com/v1/files/${fileKey}`, {
        headers: { 'X-FIGMA-TOKEN': token }
      });
      if (resp.status === 429) continue;
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      return await resp.json();
    } catch(err) {
      if (err.message === 'Rate limit exceeded') continue;
      throw err;
    }
  }
  throw new Error('Rate limit exceeded');
}

function scanFigmaFrames(data) {
  const document = data.document;
  const allFrameMetas = [];
  const nameCounts = {};

  const canvases = document.children || [];
  for (const canvas of canvases) {
    if (canvas.type !== 'CANVAS') continue;
    for (const topNode of (canvas.children || [])) {
      if (!['FRAME','COMPONENT','INSTANCE'].includes(topNode.type)) continue;
      if (isSkippableFrame(topNode.name)) continue;
      const frameBox = topNode.absoluteBoundingBox || { x:0, y:0, width:375, height:812 };
      function countTexts(node) {
        let n = 0;
        if (!node || !node.children) return 0;
        for (const child of node.children) {
          if (child.type === 'TEXT' && child.characters && child.characters.trim()) n++;
          if (child.children && child.children.length > 0) n += countTexts(child);
        }
        return n;
      }
      const textCount = countTexts(topNode);
      if (textCount <= 2) continue;
      nameCounts[topNode.name] = (nameCounts[topNode.name] || 0) + 1;
      allFrameMetas.push({
        id: topNode.id, name: topNode.name, canvasName: canvas.name,
        frameBox: frameBox, textCount: textCount
      });
    }
  }
  // Disambiguate duplicates
  const dupNames = {};
  for (const m of allFrameMetas) dupNames[m.name] = (dupNames[m.name]||0)+1;
  if (Object.values(dupNames).some(c => c>1)) {
    const ctrs = {};
    for (const m of allFrameMetas) {
      if (dupNames[m.name] > 1) { ctrs[m.name] = (ctrs[m.name]||0)+1; m.name = `${m.name} (${ctrs[m.name]})`; }
    }
  }
  allFrameMetas.sort((a,b) => a.name.localeCompare(b.name, undefined, {numeric: true}));
  return allFrameMetas;
}

function deepScanFrame(meta, rawData) {
  const frameBox = (meta.frameBox && meta.frameBox.width > 0) ? meta.frameBox : { x:0, y:0, width:375, height:812 };
  const fields = [];
  let filtered = 0, found = false;

  function findAndCollect(node) {
    if (!node || node.id !== meta.id) {
      if (node && node.children) {
        for (const child of node.children) { if (findAndCollect(child)) return true; }
      }
      return false;
    }
    found = true;
    function collectTexts(n) {
      if (!n || !n.children) return;
      for (const child of n.children) {
        if (child.type === 'TEXT' && child.characters && child.characters.trim()) {
          const raw = child.characters.trim();
          if (isDynamicData(raw)) { filtered++; }
          else {
            const textBox = child.absoluteBoundingBox || { x:0, y:0, width:0, height:0 };
            const relY = frameBox.height > 0 ? (textBox.y - frameBox.y) / frameBox.height : 0;
            fields.push({
              nodeId: child.id, text: raw,
              page: mapFrameToPage(meta.name) || '',
              module: detectModule(raw, relY),
              title: suggestTitle(raw), body: '', hidden: false,
              zhCN: raw, enUS: '', jaJP: '',
              relX: frameBox.width > 0 ? (textBox.x - frameBox.x) / frameBox.width : 0,
              relY: relY,
              relW: frameBox.width > 0 ? textBox.width / frameBox.width : 0,
              relH: frameBox.height > 0 ? textBox.height / frameBox.height : 0,
            });
          }
        }
        if (child.children && child.children.length > 0) collectTexts(child);
      }
    }
    collectTexts(node);
    return true;
  }

  const canvases = (rawData.document && rawData.document.children) || [];
  for (const canvas of canvases) {
    if (!canvas.children) continue;
    for (const child of canvas.children) {
      if (findAndCollect(child)) break;
    }
    if (found) break;
  }
  return { fields, filtered };
}

async function fetchFrameImages(fileKey, token, imageIds) {
  const images = {};
  const CHUNK = 20;
  for (let i = 0; i < imageIds.length; i += CHUNK) {
    const chunk = imageIds.slice(i, i + CHUNK);
    if (i > 0) await new Promise(r => setTimeout(r, 1500));
    try {
      const resp = await fetch(`https://api.figma.com/v1/images/${fileKey}?ids=${encodeURIComponent(chunk.join(','))}&scale=2&format=png`, {
        headers: { 'X-FIGMA-TOKEN': token }
      });
      if (resp.ok) {
        const data = await resp.json();
        if (data.images) Object.assign(images, data.images);
      } else if (resp.status === 429) {
        await new Promise(r => setTimeout(r, 10000));
        const retry = await fetch(`https://api.figma.com/v1/images/${fileKey}?ids=${encodeURIComponent(chunk.join(','))}&scale=2&format=png`, {
          headers: { 'X-FIGMA-TOKEN': token }
        });
        if (retry.ok) { const d = await retry.json(); if (d.images) Object.assign(images, d.images); }
      }
    } catch(e) { console.warn('Image chunk failed:', e); }
  }
  return images;
}

function renderCopySidebarTree() {
  if (WS.frames.length === 0) return '<div style="padding:16px;font-size:10px;color:var(--text3);">暂无页面</div>';
  const groups = {};
  for (let i = 0; i < WS.frames.length; i++) {
    const f = WS.frames[i];
    const c = f.canvasName || 'Unnamed';
    if (!groups[c]) groups[c] = [];
    groups[c].push({ ...f, idx: i });
  }
  let html = '';
  for (const [canvas, frames] of Object.entries(groups)) {
    html += `<div class="canvas-group"><div class="cg-header">▼ 📁 ${esc(canvas)}</div>`;
    for (const f of frames) {
      const active = f.idx === WS.currentFrameIdx ? ' active' : '';
      html += `<div class="frame-item${active}" onclick="selectCopyFrame(${f.idx})">🖼 ${esc(f.name)}</div>`;
    }
    html += `</div>`;
  }
  return html;
}

function renderCopyTable() {
  const tbody = document.getElementById('copyTableBody');
  if (!tbody) return;
  const frame = WS.frames[WS.currentFrameIdx];
  const onlyEmpty = document.getElementById('copyShowEmpty')?.checked || false;
  if (!frame || frame.fields.length === 0) {
    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:var(--text3);padding:48px;">当前页面无字段</td></tr>';
    return;
  }
  const fields = onlyEmpty
    ? frame.fields.filter(f => !f.hidden && (!f.enUS || !f.enUS.trim()))
    : frame.fields.filter(f => !f.hidden);
  const fc = document.getElementById('copyFieldCount');
  if (fc) fc.textContent = `${fields.length} fields`;

  let counter = 0;
  tbody.innerHTML = fields.map((f) => {
    counter++;
    const realIdx = frame.fields.indexOf(f);
    const key = buildKey(f, WS.domain);
    const hintKey = `${frame.id}_${realIdx}`;
    const hasHint = !!(WS.layer3Hints || {})[hintKey];
    const isAiFilled = f._aiGenerated;
    const compResult = (WS._compliance || {})[hintKey];
    let compTag = '';
    if (compResult === 'pass') compTag = '<span class="tag green">✓</span>';
    else if (compResult === 'warn') compTag = '<span class="tag amber">⚠</span>';
    else if (compResult === 'fail') compTag = '<span class="tag red">✗</span>';
    return `
      <tr data-field-idx="${realIdx}" class="${isAiFilled ? 'row-ai' : ''}"
          onmouseenter="highlightField(${realIdx},true)" onmouseleave="highlightField(${realIdx},false)">
        <td style="color:var(--text3);">${counter}</td>
        <td class="td-key" title="${esc(key)}">${esc(key)}</td>
        <td>${hasHint ? '<span class="tag purple" title="已填提示词">💬</span>' : ''}</td>
        <td><input type="text" class="${isAiFilled ? 'ai-filled' : ''}" value="${esc(f.zhCN || '')}" onchange="updateCopyField(${WS.currentFrameIdx},${realIdx},'zhCN',this.value)" placeholder="中文文案"></td>
        <td><input type="text" class="${isAiFilled ? 'ai-filled' : ''}" value="${esc(f.enUS || '')}" onchange="updateCopyField(${WS.currentFrameIdx},${realIdx},'enUS',this.value)" placeholder="English copy"></td>
        <td>${compTag}</td>
        <td><button class="btn ai sm" onclick="openAICopyPopup(${realIdx})" style="font-size:12px;padding:2px 6px;">🤖</button></td>
      </tr>`;
  }).join('');
}

function updateCopyField(frameIdx, fieldIdx, prop, value) {
  if (WS.frames[frameIdx] && WS.frames[frameIdx].fields[fieldIdx]) {
    WS.frames[frameIdx].fields[fieldIdx][prop] = value;
  }
}

// ---- AI Copy Popup ----
function openAICopyPopup(fieldIdx) {
  const frame = WS.frames[WS.currentFrameIdx];
  if (!frame) return;
  const f = frame.fields[fieldIdx];
  if (!f) return;
  const key = buildKey(f, WS.domain);
  const hintKey = `${frame.id}_${fieldIdx}`;
  const hint = (WS.layer3Hints || {})[hintKey] || '';

  document.getElementById('aiPopupKey').textContent = key;
  document.getElementById('aiPopupModule').textContent = f.module || 'Unknown';
  document.getElementById('aiPopupFigma').textContent = f.text || '(无)';
  document.getElementById('aiPopupHint').value = hint;
  document.getElementById('aiPopupFieldIdx').value = fieldIdx;
  document.getElementById('aiPopupResultZH').value = '';
  document.getElementById('aiPopupResultEN').value = '';
  document.getElementById('aiPopupComp').textContent = '';
  document.getElementById('aiPopupComp').className = '';
  document.getElementById('aiPopupResult').style.display = 'none';

  showModal('aiCopyPopup');
}

function closeAICopyPopup() {
  hideModal('aiCopyPopup');
}

async function generateAICopy() {
  const fieldIdx = parseInt(document.getElementById('aiPopupFieldIdx').value);
  const frame = WS.frames[WS.currentFrameIdx];
  if (!frame) return;
  const f = frame.fields[fieldIdx];
  if (!f) return;
  const apiKey = document.getElementById('copyAiKey')?.value?.trim() || WS.aiKey;
  if (!apiKey) { showToast('请填写混元 API Key'); return; }

  // Save hint
  const hintKey = `${frame.id}_${fieldIdx}`;
  WS.layer3Hints = WS.layer3Hints || {};
  WS.layer3Hints[hintKey] = document.getElementById('aiPopupHint').value;

  // Collect context
  saveLayer2Input();
  const layer1 = WS.layer1Prompt || '';
  const canvas = frame.canvasName || '';
  const layer2 = (WS.layer2Prompts || {})[canvas] || '';
  const layer3 = WS.layer3Hints[hintKey] || '';
  const module = f.module || 'Other';

  document.getElementById('aiPopupComp').textContent = '⏳ 生成中...';
  document.getElementById('aiPopupComp').className = '';
  document.getElementById('aiPopupResult').style.display = 'flex';

  try {
    const resp = await fetch(HUNYUAN_API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
      body: JSON.stringify({
        model: 'hunyuan-turbo', max_tokens: 300, temperature: 0.3,
        messages: [{ role: 'user', content: `You are a UI copywriter for Shanghai Disney Resort digital products.
Project context: ${layer1}
User flow: ${layer2}
Field hint: ${layer3}
Module type: ${module}
Figma draft text: "${f.text || ''}"
Key: ${buildKey(f, WS.domain)}

Follow these rules:
- ${module} type: ZH ≤ appropriate chars, EN ≤ appropriate words (see type rules)
- ZH: use 您 not 你, no exclamation marks
- EN: active voice, warm but professional
- No advertising law forbidden words (最, 第一, 唯一, 国家级, etc.)
- Territory: use 中国内地/中国大陆, 中国台湾/中国香港/中国澳门
- For dropdown: use 国家及地区 not 国家
- Variables in camelCase: {couponName}

Return ONLY a JSON object: {"zhCN": "...", "enUS": "..."}` }]
      })
    });
    if (!resp.ok) throw new Error(`API ${resp.status}`);
    const data = await resp.json();
    const content = data.choices?.[0]?.message?.content || '';
    const m = content.match(/\{[\s\S]*\}/);
    if (!m) throw new Error('No JSON in response');
    const result = JSON.parse(m[0]);

    document.getElementById('aiPopupResultZH').value = result.zhCN || '';
    document.getElementById('aiPopupResultEN').value = result.enUS || '';

    // Quick compliance check
    const warnings = [];
    if ((result.zhCN||'').includes('！')) warnings.push('中文含感叹号');
    if ((result.enUS||'').includes('!')) warnings.push('EN 含感叹号');
    const adWords = ['最','第一','唯一','国家级','顶级','极致','绝对'];
    for (const w of adWords) { if ((result.zhCN||'').includes(w)) warnings.push(`含广告法禁用词"${w}"`); }
    if (warnings.length > 0) {
      document.getElementById('aiPopupComp').innerHTML = '⚠ ' + warnings.join('；');
      document.getElementById('aiPopupComp').className = 'compliance-result warn';
    } else {
      document.getElementById('aiPopupComp').textContent = '✅ 合规检查通过';
      document.getElementById('aiPopupComp').className = 'compliance-result pass';
    }
  } catch(err) {
    document.getElementById('aiPopupComp').textContent = '❌ 生成失败: ' + err.message;
    document.getElementById('aiPopupComp').className = 'compliance-result fail';
  }
}

// ---- Batch AI ----
async function batchAICopy() {
  console.log('[batchAICopy] called');
  saveLayer2Input();
  const apiKey = document.getElementById('copyAiKey')?.value?.trim() || WS.aiKey;
  console.log('[batchAICopy] apiKey:', apiKey ? 'present' : 'missing');
  if (!apiKey) { showToast('请填写混元 API Key'); return; }
  // Collect non-hidden fields from current frame that are missing enUS
  const frame = WS.frames[WS.currentFrameIdx];
  if (!frame) { showToast('当前页面无数据'); return; }
  const toGenerate = [];
  for (let i = 0; i < frame.fields.length; i++) {
    const f = frame.fields[i];
    if (f.hidden) continue;
    if (f.enUS && f.enUS.trim()) continue;
    toGenerate.push({ frame, fieldIdx: i });
  }
  console.log('[batchAICopy] toGenerate:', toGenerate.length);
  if (toGenerate.length === 0) { showToast('所有字段已完成，无需生成'); return; }

  // Confirm for large batches
  if (toGenerate.length > 50) {
    if (!confirm(`即将为 ${toGenerate.length} 个字段生成文案，预计需要较长时间。继续？`)) return;
  }

  showToast(`开始批量生成 · ${toGenerate.length} 条`);
  let done = 0;
  for (const item of toGenerate) {
    const f = item.frame.fields[item.fieldIdx];
    const canvas = item.frame.canvasName || '';
    const hintKey = `${item.frame.id}_${item.fieldIdx}`;
    const layer3 = (WS.layer3Hints || {})[hintKey] || '';
    try {
      const resp = await fetch(HUNYUAN_API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
        body: JSON.stringify({
          model: 'hunyuan-turbo', max_tokens: 200, temperature: 0.3,
          messages: [{ role: 'user', content: `UI copy for Shanghai Disney Resort.
Context: ${WS.layer1Prompt || ''}
Flow: ${(WS.layer2Prompts||{})[canvas] || ''}
${layer3 ? `Hint: ${layer3}` : ''}
Module: ${f.module||'Other'}. Figma: "${f.text||''}"
Key: ${buildKey(f, WS.domain)}
Rules: ZH≤appropriate length, EN active voice, no 最/第一/唯一/国家级, 您 not 你, camelCase variables.
Return ONLY JSON: {"zhCN":"...","enUS":"..."}` }]
        })
      });
      if (resp.ok) {
        const data = await resp.json();
        const content = data.choices?.[0]?.message?.content || '';
        const m = content.match(/\{[\s\S]*\}/);
        if (m) {
          const r = JSON.parse(m[0]);
          if (r.zhCN) f.zhCN = r.zhCN;
          if (r.enUS) f.enUS = r.enUS;
          f._aiGenerated = true;
        }
      }
    } catch(e) { console.warn('Batch AI failed for', f.text, e); }
    done++;
    // Update status every 5 fields
    if (done % 5 === 0 || done === toGenerate.length) {
      const st = document.getElementById('wsStatus');
      if (st) st.textContent = `🤖 ${done}/${toGenerate.length}`;
    }
  }
  showToast(`批量完成 · ${done} 条`);
  // Uncheck filter so user sees all filled content
  const onlyEmptyCb = document.getElementById('copyShowEmpty');
  if (onlyEmptyCb) onlyEmptyCb.checked = false;
  render();
  // Auto-save
  await saveCurrentProject();
}

// ---- AI Compliance ----
async function batchAICompliance() {
  saveLayer2Input();
  const apiKey = document.getElementById('copyAiKey')?.value?.trim() || WS.aiKey;
  if (!apiKey) { showToast('请填写混元 API Key'); return; }
  const frame = WS.frames[WS.currentFrameIdx];
  if (!frame) return;
  const fields = frame.fields.filter(f => !f.hidden && (f.zhCN || f.enUS));
  if (fields.length === 0) { showToast('当前页面无文案可审查'); return; }

  WS.status = '合规审查中...';
  WS.statusType = 'loading';
  renderToolbar();

  try {
    const items = fields.map(f => `Key: ${buildKey(f, WS.domain)}\nZH: ${f.zhCN||''}\nEN: ${f.enUS||''}`).join('\n---\n');
    const resp = await fetch(HUNYUAN_API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
      body: JSON.stringify({
        model: 'hunyuan-turbo', max_tokens: 500, temperature: 0,
        messages: [{ role: 'user', content: `Review these UI copy strings for compliance. Check:
1. 广告法禁用词 (最/第一/唯一/国家级/顶级/极致/绝对)
2. 国家及地区表述 (下拉用"国家及地区"非"国家", 台港澳前加"中国")
3. 感叹号使用
4. 句式是否符合其类型规范

Return ONLY a JSON object: {"results": [{"key":"...", "status":"pass"|"warn"|"fail", "msg":"..."}]}

Copy strings:\n${items}` }]
      })
    });
    if (!resp.ok) throw new Error(`API ${resp.status}`);
    const data = await resp.json();
    const content = data.choices?.[0]?.message?.content || '';
    const m = content.match(/\{[\s\S]*\}/);
    if (m) {
      const r = JSON.parse(m[0]);
      WS._compliance = WS._compliance || {};
      let pass = 0, warn = 0, fail = 0;
      const msgs = [];
      for (const item of (r.results || [])) {
        for (let i = 0; i < frame.fields.length; i++) {
          if (buildKey(frame.fields[i], WS.domain) === item.key) {
            WS._compliance[`${frame.id}_${i}`] = item.status;
            break;
          }
        }
        if (item.status === 'pass') pass++;
        else if (item.status === 'warn') { warn++; msgs.push(`⚠ ${item.key}: ${item.msg}`); }
        else { fail++; msgs.push(`✗ ${item.key}: ${item.msg}`); }
      }
      showComplianceResult(pass, warn, fail, msgs);
    }
  } catch(err) {
    showToast('合规审查失败: ' + err.message);
  }
  WS.status = '合规审查完成';
  WS.statusType = 'ok';
  render();
}

function showComplianceResult(pass, warn, fail, msgs) {
  let body = `<p style="font-size:13px;margin-bottom:10px;">审查完成：${pass} 通过`;
  if (warn > 0) body += ` · ${warn} 建议`;
  if (fail > 0) body += ` · ${fail} 违规`;
  body += `</p>`;
  if (msgs.length > 0) body += `<div style="max-height:200px;overflow-y:auto;font-size:11px;line-height:1.6;background:#f9fafb;padding:10px;border-radius:6px;">${msgs.map(m => `<div>${m}</div>`).join('')}</div>`;
  body += `<div style="margin-top:12px;text-align:right;"><button class="btn primary sm" onclick="hideModal('complianceResultPopup')">关闭</button></div>`;
  document.getElementById('compResultContent').innerHTML = body;
  showModal('complianceResultPopup');
}

function pickerSelectAll() {
  document.querySelectorAll('.picker-check:not([disabled])').forEach(c => c.checked = true);
}
function pickerDeselectAll() {
  document.querySelectorAll('.picker-check:not([disabled])').forEach(c => c.checked = false);
}

function pickerConfirm() {
  const checks = document.querySelectorAll('.picker-check:checked:not([disabled])');
  if (checks.length === 0) { showToast('请至少选择一个 Frame'); return; }
  const selectedIndices = Array.from(checks).map(cb => parseInt(cb.value));
  addFramesToProject(selectedIndices);
  WS.pickerOpen = false;
  render();
}

async function addFramesToProject(selectedIndices) {
  WS.status = `正在处理 ${selectedIndices.length} 个 Frame...`;
  WS.statusType = 'loading';
  renderToolbar();

  const imageIds = [];
  let totalFields = 0, totalFiltered = 0;

  for (const idx of selectedIndices) {
    const meta = WS.allFrameMetas[idx];
    // Check if frame already exists → skip
    if (WS.frames.some(f => f.id === meta.id)) continue;

    const { fields, filtered } = deepScanFrame(meta, WS.rawData);
    totalFields += fields.length;
    totalFiltered += filtered;
    WS.frames.push({
      id: meta.id, name: meta.name, canvasName: meta.canvasName,
      frameBox: meta.frameBox, fields: fields
    });
    if (!meta.id.startsWith('mock-')) imageIds.push(meta.id);
  }

  if (imageIds.length > 0 && WS.token) {
    const newImages = await fetchFrameImages(WS.fileKey, WS.token, imageIds);
    Object.assign(WS.frameImages, newImages);
  }

  WS.status = `已添加 ${selectedIndices.length} 个 Frame · ${totalFields} 个字段`;
  WS.statusType = 'ok';
  render();
}

    body.innerHTML = '<div class="empty-state"><div class="icon">📱</div><p>暂无页面数据</p></div>';

    if (label) label.textContent = '';

  }

  const label = document.getElementById('previewFrameLabel');
  if (label) label.textContent = frame.canvasName ? `${frame.canvasName} / ${frame.name}` : frame.name;

  const imgUrl = WS.frameImages[frame.id];
  const visibleFields = frame.fields.filter(f => !f.hidden);

  if (imgUrl) {
    // Group fields by position to avoid duplicate overlays
    const posGroups = new Map();
    for (const f of visibleFields) {
      const pk = `${f.relX.toFixed(4)}_${f.relY.toFixed(4)}_${f.relW.toFixed(4)}_${f.relH.toFixed(4)}`;
      if (!posGroups.has(pk)) posGroups.set(pk, []);
      posGroups.get(pk).push(frame.fields.indexOf(f));
    }
    const overlaysHTML = Array.from(posGroups.entries()).map(([pk, indices]) => {
      const f = frame.fields[indices[0]];
      const nums = indices.map(i => i + 1).join(',');
      const multi = indices.length > 1 ? ' multi' : '';
      return `<div class="highlight-overlay" data-fields="${indices.join(',')}"
        style="left:${(f.relX*100).toFixed(2)}%;top:${(f.relY*100).toFixed(2)}%;width:${Math.max(f.relW*100,1).toFixed(2)}%;height:${Math.max(f.relH*100,0.5).toFixed(2)}%;">
        <div class="hl-num${multi}">${nums}</div></div>`;
    }).join('');

    body.innerHTML = `
      <div style="position:relative;display:inline-block;line-height:0;width:100%;">
        <img src="${imgUrl}" alt="${esc(frame.name)}" style="width:100%;display:block;"
             onerror="console.warn('Image load failed')">
        <div style="position:absolute;inset:0;pointer-events:none;">${overlaysHTML}</div>

  } else {
    const colors = ['#eff6ff','#fef3c7','#f3e8ff','#ccfbf1','#fff1f2','#f0fdf4','#fff7ed','#f5f3ff'];
    body.innerHTML = `
      <div style="background:#fff;width:100%;border-radius:6px;box-shadow:0 2px 8px rgba(0,0,0,.06);padding:16px;font-size:12px;display:flex;flex-direction:column;gap:8px;">
        ${visibleFields.map((f, i) => `
          <div style="padding:5px 8px;background:${colors[i%colors.length]};border:1px dashed #93c5fd;border-radius:4px;display:flex;align-items:center;gap:8px;">
            <span style="color:#2563eb;font-weight:600;font-size:10px;min-width:18px;">${i+1}</span>
            <span>${esc(f.text)}</span></div>`).join('')}
        <div style="font-size:10px;color:#9ca3af;text-align:center;">${visibleFields.length} 个字段（无 Figma 截图时显示占位）</div>
      </div>`;
  }
}

        <td class="td-key" title="${esc(key)}">${key || '<span style="color:#9ca3af;">待完善...</span>'}</td>
        <td style="white-space:nowrap;">
          <button class="op-btn${isHidden ? ' restore' : ''}" onclick="toggleHide(${realIdx})">${isHidden ? '恢复' : '隐藏'}</button>
          <button class="op-btn" onclick="duplicateField(${realIdx})" title="复制此key">复制</button>
        </td>
      </tr>`;
  }).join('');
}

function highlightField(idx, active) {
  const frame = WS.frames[WS.currentFrameIdx];
  if (!frame || !frame.fields[idx]) return;
  const f = frame.fields[idx];
  // Find all fields at the same position
  const posKey = `${f.relX.toFixed(4)}_${f.relY.toFixed(4)}_${f.relW.toFixed(4)}_${f.relH.toFixed(4)}`;
  const siblingIndices = [];
  for (let i = 0; i < frame.fields.length; i++) {
    const fi = frame.fields[i];
    const pk = `${fi.relX.toFixed(4)}_${fi.relY.toFixed(4)}_${fi.relW.toFixed(4)}_${fi.relH.toFixed(4)}`;
    if (pk === posKey) siblingIndices.push(i);
  }
  // Highlight overlay (find by any sibling index in data-fields)
  const searchIdx = siblingIndices[0];
  const overlay = document.querySelector(`.highlight-overlay[data-fields*="${searchIdx}"]`);
  if (overlay) overlay.classList.toggle('active', active);
  // Highlight all sibling table rows
  for (const si of siblingIndices) {
    const row = document.querySelector(`tr[data-field-idx="${si}"]`);
    if (row) row.classList.toggle('row-hover', active);
  }
}

function updateField(idx, prop, value) {
  const frame = WS.frames[WS.currentFrameIdx];
  if (!frame) return;
  frame.fields[idx][prop] = value;
  renderKeyTable();
}

function toggleHide(idx) {
  const frame = WS.frames[WS.currentFrameIdx];
  if (!frame) return;
  frame.fields[idx].hidden = !frame.fields[idx].hidden;
  renderPreviewContent();
  renderKeyTable();
}

// ---- Duplicate Key ----
function duplicateField(idx) {
  const frame = WS.frames[WS.currentFrameIdx];
  if (!frame) return;
  const original = frame.fields[idx];
  const clone = JSON.parse(JSON.stringify(original));
  clone._aiGenerated = false;
  frame.fields.splice(idx + 1, 0, clone);
  renderPreviewContent();
  renderKeyTable();
  showToast('已复制字段');
}

// ---- Batch Select ----
function toggleBatchSelect() {
  WS.batchSelectMode = !WS.batchSelectMode;
  if (!WS.batchSelectMode) WS.selectedFields = new Set();
  updateBatchSelectButton();
  renderKeyTable();
}

function updateBatchSelectButton() {
  const btn = document.getElementById('btnSelectMode');
  const hideBtn = document.getElementById('btnBatchHide');
  if (!btn) return;
  if (WS.batchSelectMode) {
    btn.textContent = '取消选择';
    btn.className = 'btn sm';
    if (hideBtn) hideBtn.style.display = '';
    updateBatchHideButton();
  } else {
    btn.textContent = '☐ 全选字段';
    btn.className = 'btn sm';
    if (hideBtn) hideBtn.style.display = 'none';
    // Reset select-all checkbox
    const selAll = document.getElementById('selectAllCheckbox');
    if (selAll) selAll.checked = false;
  }
}

function toggleFieldSelect(idx, checked) {
  if (checked) { WS.selectedFields.add(idx); }
  else { WS.selectedFields.delete(idx); }
  updateBatchHideButton();
  const row = document.querySelector(`tr[data-field-idx="${idx}"]`);
  if (row) row.classList.toggle('row-selected', checked);
  // Sync select-all checkbox
  const selAll = document.getElementById('selectAllCheckbox');
  if (selAll) {
    const frame = WS.frames[WS.currentFrameIdx];
    const showHidden = document.getElementById('showHidden')?.checked || false;
    const visibleCount = frame ? frame.fields.filter(f => showHidden || !f.hidden).length : 0;
    selAll.checked = visibleCount > 0 && WS.selectedFields.size === visibleCount;
  }
}

function toggleSelectAll(checked) {
  const frame = WS.frames[WS.currentFrameIdx];
  if (!frame) return;
  const showHidden = document.getElementById('showHidden')?.checked || false;
  WS.selectedFields = new Set();
  if (checked) {
    for (let i = 0; i < frame.fields.length; i++) {
      if (showHidden || !frame.fields[i].hidden) WS.selectedFields.add(i);
    }
  }
  updateBatchHideButton();
  renderKeyTable();
}

function updateBatchHideButton() {
  const btn = document.getElementById('btnBatchHide');
  if (!btn) return;
  const count = WS.selectedFields.size;
  if (count > 0) {
    btn.style.display = '';
    btn.textContent = `隐藏选中 (${count})`;
  } else {
    btn.textContent = '隐藏选中 (0)';
    btn.style.display = WS.batchSelectMode ? '' : 'none';
  }
}

function batchHideSelected() {
  const count = WS.selectedFields.size;
  if (count === 0) return;
  if (!confirm(`隐藏选中的 ${count} 个字段？`)) return;
  const frame = WS.frames[WS.currentFrameIdx];
  if (!frame) return;
  for (const idx of WS.selectedFields) {
    if (frame.fields[idx]) frame.fields[idx].hidden = true;
  }
  WS.selectedFields = new Set();
  WS.batchSelectMode = false;
  updateBatchSelectButton();
  renderPreviewContent();
  renderKeyTable();
  showToast(`已隐藏 ${count} 个字段`);
}

function unhideAll() {
  for (const f of WS.frames) for (const fi of f.fields) fi.hidden = false;
  renderPreviewContent();
  renderKeyTable();
}

function deleteHidden() {
  if (!confirm('删除当前页面所有已隐藏字段？')) return;
  const frame = WS.frames[WS.currentFrameIdx];
  if (!frame) return;
  const before = frame.fields.length;
  frame.fields = frame.fields.filter(f => !f.hidden);
  showToast(`已删除 ${before - frame.fields.length} 个字段`);
  render();
}

function setupNewKeyDrag() {
  const wrap = document.getElementById('nkCanvasWrap');
  const container = document.getElementById('nkImgContainer');
  const sel = document.getElementById('nkSelection');
  const posInfo = document.getElementById('nkPosInfo');
  if (!wrap || !container) return;
  wrap.onmousedown = function(e) {
    const img = document.getElementById('nkPreviewImg');
    if (!img) return;
    const rect = img.getBoundingClientRect();
    _nkDragState = {
      startX: (e.clientX - rect.left) / rect.width,
      startY: (e.clientY - rect.top) / rect.height
    };
    sel.style.display = 'block';
  };
  wrap.onmousemove = function(e) {
    if (!_nkDragState) return;
    const img = document.getElementById('nkPreviewImg');
    if (!img) return;
    const rect = img.getBoundingClientRect();
    const curX = (e.clientX - rect.left) / rect.width;
    const curY = (e.clientY - rect.top) / rect.height;
    const left = Math.min(_nkDragState.startX, curX);
    const top = Math.min(_nkDragState.startY, curY);
    const width = Math.abs(curX - _nkDragState.startX);
    const height = Math.abs(curY - _nkDragState.startY);
    sel.style.left = (left * 100) + '%';
    sel.style.top = (top * 100) + '%';
    sel.style.width = (width * 100) + '%';
    sel.style.height = (height * 100) + '%';
  };
  document.addEventListener('mouseup', function(e) {
    if (!_nkDragState) return;
    const img = document.getElementById('nkPreviewImg');
    if (!img) { _nkDragState = null; return; }
    const rect = img.getBoundingClientRect();
    const endX = (e.clientX - rect.left) / rect.width;
    const endY = (e.clientY - rect.top) / rect.height;
    const relX = Math.min(_nkDragState.startX, endX);
    const relY = Math.min(_nkDragState.startY, endY);
    const relW = Math.abs(endX - _nkDragState.startX);
    const relH = Math.abs(endY - _nkDragState.startY);
    if (relW < 0.005 || relH < 0.005) {
      sel.style.display = 'none';
      posInfo.textContent = '区域太小，请重新框选';
      _nkDragState = null;
      return;
    }
    sel.dataset.relX = relX;
    sel.dataset.relY = relY;
    sel.dataset.relW = relW;
    sel.dataset.relH = relH;
    posInfo.textContent = `已选: ${(relX*100).toFixed(0)}%,${(relY*100).toFixed(0)}% · ${(relW*100).toFixed(0)}%×${(relH*100).toFixed(0)}%`;
    _nkDragState = null;
  });
}

function navFrame(dir) {

// ============================================================
async function loadFigmaForProject() {
  const urlEl = document.getElementById('figmaUrl');
  const tokenEl = document.getElementById('figmaToken');
  if (!urlEl || !tokenEl) return;
  const url = urlEl.value.trim();
  const token = tokenEl.value.trim();
  if (!url || !token) { showToast('请填写 Figma URL 和 Token'); return; }
  const fileKey = parseFileKey(url);
  if (!fileKey) { showToast('无法解析 Figma URL'); return; }

  WS.figmaUrl = url;
  WS.token = token;
  WS.fileKey = fileKey;
  WS.status = '正在加载 Figma...';
  WS.statusType = 'loading';
  render();

  try {
    const data = await fetchFigmaFile(fileKey, token);
    WS.rawData = data;
    WS.allFrameMetas = scanFigmaFrames(data);
    WS.status = `已扫描 ${WS.allFrameMetas.length} 个 Frame`;
    WS.statusType = 'ok';
    WS.pickerOpen = true;

    // Persist figmaUrl/token to project
    const projects = loadProjects();
    const idx = projects.findIndex(p => p.id === WS.projectId);
    if (idx >= 0) {
      projects[idx].figmaUrl = url;
      projects[idx].updatedAt = Date.now();
      saveProjects(projects);
    }
    render();
  } catch(err) {
    console.error(err);
    WS.status = `加载失败: ${err.message}`;
    WS.statusType = 'err';
    render();
    showToast('Figma 加载失败: ' + err.message);
  }
}

async function syncFigma() {
  if (!WS.fileKey || !WS.token) { showToast('请先加载 Figma 文件'); return; }
  WS.status = '正在同步 Figma...';
  WS.statusType = 'loading';
  render();

  try {
    const data = await fetchFigmaFile(WS.fileKey, WS.token);
    WS.rawData = data;
    WS.allFrameMetas = scanFigmaFrames(data);
    WS.status = '同步完成 · 点击「管理页面」添加新 Frame';
    WS.statusType = 'ok';
    WS.pickerOpen = true;
    render();
  } catch(err) {
    WS.status = `同步失败: ${err.message}`;
    WS.statusType = 'err';
    render();
    showToast('同步失败: ' + err.message);
  }
}

// ============================================================
// PERSISTENCE: SAVE / LOAD PROJECT DATA
// ============================================================
async function saveCurrentProject() {
  if (!WS.projectId) return;
  WS.status = '正在保存...';
  WS.statusType = 'loading';
  renderToolbar();

  try {
    // Save raw Figma data
    if (WS.rawData) {
      WS.aiKey = document.getElementById('aiApiKey')?.value?.trim() || WS.aiKey;
      await dbPut('figmaData', {
        projectId: WS.projectId,
        fileKey: WS.fileKey,
        rawData: WS.rawData,
        frameImages: WS.frameImages,
        figmaUrl: WS.figmaUrl,
        token: WS.token,
        aiKey: WS.aiKey,
        timestamp: Date.now()
      });
    }
    // Save key data + prompts
    await dbPut('projectKeys', {
      projectId: WS.projectId,
      domain: WS.domain,
      frames: WS.frames.map(f => ({
        id: f.id, name: f.name, canvasName: f.canvasName,
        frameBox: f.frameBox, fields: f.fields
      })),
      layer1Prompt: WS.layer1Prompt,
      layer2Prompts: WS.layer2Prompts,
      layer3Hints: WS.layer3Hints
    });

    // Update project timestamp
    const projects = loadProjects();
    const idx = projects.findIndex(p => p.id === WS.projectId);
    if (idx >= 0) { projects[idx].updatedAt = Date.now(); saveProjects(projects); }

    WS.copySaved = true;
    WS.status = '已保存';
    WS.statusType = 'ok';
    renderToolbar();
    showToast('项目已保存');
  } catch(err) {
    console.error('Save failed:', err);
    WS.status = '保存失败';
    WS.statusType = 'err';
    renderToolbar();
    showToast('保存失败: ' + err.message);
  }
}

async function loadProjectData(projectId) {
  try {
    const figmaData = await dbGet('figmaData', projectId);
    const keyData = await dbGet('projectKeys', projectId);

    if (figmaData) {
      WS.rawData = figmaData.rawData || null;
      WS.frameImages = figmaData.frameImages || {};
      WS.fileKey = figmaData.fileKey || '';
      WS.figmaUrl = figmaData.figmaUrl || '';
      WS.token = figmaData.token || '';
      WS.aiKey = figmaData.aiKey || '';
      if (WS.rawData) {
        WS.allFrameMetas = scanFigmaFrames(WS.rawData);
      }
    }

    if (keyData) {
      WS.domain = keyData.domain || WS.domain;
      WS.frames = keyData.frames || [];
      WS.copySaved = true;
      WS.layer1Prompt = keyData.layer1Prompt || '';
      WS.layer2Prompts = keyData.layer2Prompts || {};
      WS.layer3Hints = keyData.layer3Hints || {};
      WS._compliance = keyData._compliance || {};
    }

    if (!figmaData && !keyData) return false;
    return true;
  } catch(err) {
    console.error('Load failed:', err);
    return false;
  }
}

function openProjectModal(projectId) {
  EDITING_PROJECT_ID = projectId;

  const nameEl = document.getElementById('projName');
  const domainEl = document.getElementById('projDomain');
  const urlEl = document.getElementById('projFigmaUrl');

  if (projectId) {
    const projects = loadProjects();

    if (p) {
      title.textContent = '编辑项目';
      nameEl.value = p.name;
      domainEl.value = p.domain;
      urlEl.value = p.figmaUrl || '';
      tokenEl.value = '';
      saveBtn.textContent = '保存修改';
    }
  } else {
    title.textContent = '新建项目';

    domainEl.value = '';
    urlEl.value = '';
    tokenEl.value = '';
    saveBtn.textContent = '创建项目';

function saveProject() {
  const name = document.getElementById('projName').value.trim();
  const domain = document.getElementById('projDomain').value.trim();
  const figmaUrl = document.getElementById('projFigmaUrl').value.trim();
  const token = document.getElementById('projToken').value.trim();

  if (!name || !domain) { showToast('请填写项目名称和 Domain'); return; }

  const projects = loadProjects();

  if (EDITING_PROJECT_ID) {
    const idx = projects.findIndex(p => p.id === EDITING_PROJECT_ID);
    if (idx >= 0) {
      projects[idx].name = name;
      projects[idx].domain = domain;
      if (figmaUrl) projects[idx].figmaUrl = figmaUrl;
      projects[idx].updatedAt = Date.now();
    }
  } else {
    const id = 'proj_' + Date.now();
    projects.push({
      id, name, domain,
      figmaUrl: figmaUrl || '',
      createdAt: Date.now(),
      updatedAt: Date.now()
    });
  }

  saveProjects(projects);
  hideModal('projectModal');
  render();
  showToast(EDITING_PROJECT_ID ? '项目已更新' : '项目已创建');

async function deleteProject(projectId) {
  if (!confirm('确定删除此项目？所有保存的 Figma 数据和 Key 将被删除，此操作不可恢复。')) return;
  const projects = loadProjects().filter(p => p.id !== projectId);
  saveProjects(projects);
  try { await dbDelete('figmaData', projectId); } catch(e) {}
  try { await dbDelete('projectKeys', projectId); } catch(e) {}
  render();
  showToast('项目已删除');
}

async function enterProject(projectId) {
  const projects = loadProjects();
  const proj = projects.find(p => p.id === projectId);
  if (!proj) return;
  wsReset();
  WS.projectId = projectId;

function showVisualDocPicker() {
  const groups = {};
  for (let i = 0; i < WS.frames.length; i++) {
    const f = WS.frames[i];
    const c = f.canvasName || 'Unnamed';
    if (!groups[c]) groups[c] = [];
    groups[c].push({ ...f, idx: i });
  }
  let html = '';
  for (const [canvas, frames] of Object.entries(groups)) {
    html += `<div style="padding:6px 10px;font-size:10px;font-weight:700;color:var(--text3);background:#f9fafb;">📁 ${esc(canvas)}</div>`;
    for (const f of frames) {
      const hasImg = !!WS.frameImages[f.id];
      html += `
        <label class="fp-item" style="display:flex;align-items:center;gap:8px;${!hasImg ? 'opacity:.4;' : ''}">
          <input type="checkbox" class="vd-check" value="${f.idx}" ${hasImg ? 'checked' : 'disabled'}>
          <span style="flex:1;font-size:12px;">🖼 ${esc(f.name)}</span>
          <span style="font-size:10px;color:var(--text3);">${f.fields.filter(fi=>!fi.hidden).length} fields${!hasImg ? ' · 无截图' : ''}</span>
        </label>`;
    }
  }
  document.getElementById('vdPickerList').innerHTML = html;
  showModal('visualDocPicker');
}

    const framesWithImages = [];
    for (let j = 0; j < selectedIndices.length; j++) {
      const frame = WS.frames[selectedIndices[j]];
      const imgUrl = WS.frameImages[frame.id];
      const visibleFields = frame.fields.filter(f => !f.hidden);
      WS.status = `处理截图 ${j+1}/${selectedIndices.length}...`;
      renderToolbar();
      const dims = await getImageDimensions(imgUrl, frame, visibleFields);
      if (!dims) continue;
      framesWithImages.push({ frame, fields: visibleFields, imgUrl, width: dims.width, height: dims.height });
    }
    const html = buildPrintHTML(framesWithImages);
    downloadBlob(html, `copy-keys-${WS.domain}-visual.html`, 'text/html;charset=utf-8');
    WS.status = `已生成 · ${framesWithImages.length} 页 · HTML 文档已下载`;
    WS.statusType = 'ok';
    showToast('视觉文档已导出');
  } catch(err) {
    console.error('Visual doc export failed:', err);
    WS.status = '导出失败'; WS.statusType = 'err';
    showToast('导出失败: ' + err.message);
  }
  renderToolbar();
}

function getImageDimensions(imgUrl) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => resolve({ width: img.naturalWidth, height: img.naturalHeight });
    img.onerror = () => resolve(null);
    img.src = imgUrl;
  });
}

function buildPrintHTML(framesWithImages) {
  let bodyHTML = '';
  for (const { frame, fields, imgUrl, width, height } of framesWithImages) {
    // Generate overlay DIVs (not images) — works reliably in print/PDF
    const overlayDivs = fields.map((f) => {
      const idx = frame.fields.indexOf(f);
      return `<div style="
        position:absolute;
        left:${(f.relX*100).toFixed(2)}%;top:${(f.relY*100).toFixed(2)}%;
        width:${Math.max(f.relW*100,2).toFixed(2)}%;height:${Math.max(f.relH*100,1).toFixed(2)}%;
        border:1.5px dashed #2563eb;pointer-events:none;z-index:2;
      "><span style="
        position:absolute;top:-12px;left:-4px;
        background:#dc2626;color:#fff;font-size:10px;font-weight:700;
        width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;
      ">${idx+1}</span></div>`;
    }).join('');

    let tableRows = '';
    for (const f of fields) {
      const key = buildKey(f, WS.domain);
      const idx = frame.fields.indexOf(f);
      tableRows += `<tr>
        <td style="width:30px;text-align:center;vertical-align:top;">${idx+1}</td>
        <td style="font-family:Consolas,monospace;font-size:10px;vertical-align:top;">${escXml(key)}</td>
        <td style="font-size:10px;vertical-align:top;">${escXml(f.text || '')}</td>
        
      </tr>`;
    }

    bodyHTML += `<h2>${escXml(frame.canvasName)} / ${escXml(frame.name)} <span style="font-size:10px;color:#666;font-weight:normal;">(${fields.length} fields)</span></h2>
      <table style="width:100%;border-collapse:collapse;" class="page-break"><tr>
        <td style="width:30%;vertical-align:top;padding:8px;">
          <div style="position:relative;display:block;line-height:0;width:100%;max-width:${width}px;">
            <img src="${escXml(imgUrl)}" style="width:100%;height:auto;display:block;border:1px solid #ddd;" />
            ${overlayDivs}
          </div>
        </td>
        <td style="width:70%;vertical-align:top;padding:8px;">
          <table style="width:100%;border-collapse:collapse;font-family:Arial,sans-serif;">
            <thead><tr style="background:#f5f5f5;">
              <th style="text-align:left;padding:6px;border-bottom:1px solid #ccc;font-size:10px;">#</th>
              <th style="text-align:left;padding:6px;border-bottom:1px solid #ccc;font-size:10px;">Key</th>
              <th style="text-align:left;padding:6px;border-bottom:1px solid #ccc;font-size:10px;">中文</th>
              <th style="text-align:left;padding:6px;border-bottom:1px solid #ccc;font-size:10px;">English</th>
            </tr></thead>
            <tbody>${tableRows}</tbody>
          </table>
        </td>
      </tr></table>`;
  }

  return `<!DOCTYPE html><html><head><meta charset="UTF-8"><style>
  @page { size: A4 landscape; margin: 12mm; }
  @media print { body { -webkit-print-color-adjust: exact; print-color-adjust: exact; } }
  body { font-family: -apple-system, 'PingFang SC', Arial, sans-serif; font-size: 11px; color: #1a1c1e; }
  h1 { font-size: 18px; margin-bottom: 4px; } h2 { font-size: 14px; margin: 8px 0 4px; }
  table { border-collapse: collapse; } table td { padding: 4px 6px; border-bottom: 1px solid #eee; vertical-align: top; }
</style></head><body>
  <h1>Copy Key Document — ${escXml(WS.domain)}</h1>
  <p style="color:#666;font-size:10px;margin-bottom:16px;">
    Project: ${escXml(WS.domain)} · Exported: ${new Date().toLocaleDateString('zh-CN')} · ${framesWithImages.length} pages
  </p>${bodyHTML}
</body></html>`;
}

function escXml(str) {
  return (str || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function downloadBlob(content, filename, type) {
  const blob = new Blob([content], { type });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ============================================================
// UTILS
// ============================================================
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._timeout);
  t._timeout = setTimeout(() => t.classList.remove('show'), 2200);
}
function showModal(id) { document.getElementById(id).classList.add('show'); }
function hideModal(id) { document.getElementById(id).classList.remove('show'); }

function renderToolbar() {
  const el = document.getElementById('wsToolbar');
  if (el) el.innerHTML = renderToolbarContent();
}

// Keyboard
document.addEventListener('keydown', function(e) {
  if (!WS.projectId) return;
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT' || e.target.tagName === 'TEXTAREA') return;
  // Don't navigate when a modal is open
  if (document.querySelector('.modal-overlay.show')) return;
  if (WS.frames.length > 1) {
    if (e.key === 'ArrowLeft' && !e.metaKey && !e.ctrlKey) { e.preventDefault(); navFrame(-1); }
    if (e.key === 'ArrowRight' && !e.metaKey && !e.ctrlKey) { e.preventDefault(); navFrame(1); }
  }
});

// ============================================================
// INIT
// ============================================================
(async function init() {
  await loadRules();
  setupNewKeyDrag();
  render();
})();
</script>
</body>
